openapi: 3.0.3
info:
  title: Tangible Tracker API
  description: |
    API REST para la gestión interna de tareas e incidencias del equipo de desarrollo.
    Backend construido con Node.js, Express, TypeScript y Firebase Firestore.

    ## Módulos
    - **Tasks** — CRUD de tareas con asignación opcional a usuarios
    - **Users** — CRUD de usuarios del equipo (sin autenticación)
    - **Logs** — Historial de actividad y stream en tiempo real

    ## Tiempo real
    El endpoint `GET /api/logs/stream` usa Server-Sent Events (SSE).
    En el frontend, conéctate con `EventSource`.
  version: 1.1.0
  contact:
    name: Tangible Immersive

servers:
  - url: http://localhost:3000
    description: Desarrollo local

tags:
  - name: Health
    description: Estado del servidor y conexión a Firestore
  - name: Tasks
    description: CRUD de tareas e incidencias
  - name: Users
    description: CRUD de usuarios del equipo (asignables a tareas)
  - name: Logs
    description: Historial de actividad y stream en tiempo real

paths:
  /health:
    get:
      tags: [Health]
      summary: Health check
      description: Verifica el estado del servidor y la conexión con Firestore.
      operationId: getHealth
      responses:
        '200':
          description: Servidor y base de datos operativos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthSuccessResponse'
              example:
                success: true
                data:
                  status: ok
                  timestamp: '2026-07-09T06:13:48.247Z'
                  uptime: 57.5
                  environment: development
                  database: connected
        '503':
          description: Servidor activo pero Firestore desconectado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthSuccessResponse'
              example:
                success: true
                data:
                  status: degraded
                  timestamp: '2026-07-09T06:13:48.247Z'
                  uptime: 57.5
                  environment: development
                  database: disconnected

  /api/tasks:
    get:
      tags: [Tasks]
      summary: Listar tareas
      description: |
        Obtiene tareas paginadas ordenadas por fecha de creación (más reciente primero).
        Query params: `page` (default 1), `limit` (default 20, máx 100).
      operationId: listTasks
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Lista de tareas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskListSuccessResponse'
    post:
      tags: [Tasks]
      summary: Crear tarea
      description: |
        Crea una nueva tarea. Registra automáticamente un log de actividad.
        Si no se envían `status` o `priority`, se usan `pending` y `medium`.
        Opcionalmente puedes asignar un usuario existente con `assignedUserId`.
      operationId: createTask
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTaskRequest'
            example:
              title: Incidencia login
              description: Error al iniciar sesión en producción
              status: pending
              priority: high
              assignedUserId: rL78DWAccy74Z3xYEOxN
      responses:
        '201':
          description: Tarea creada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskSuccessResponse'
        '400':
          description: Validación fallida o usuario asignado inexistente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                validacion:
                  summary: Campo inválido
                  value:
                    success: false
                    error:
                      statusCode: 400
                      message: El título es obligatorio
                usuarioInvalido:
                  summary: Usuario asignado no encontrado
                  value:
                    success: false
                    error:
                      statusCode: 400
                      message: Usuario asignado no encontrado
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/tasks/{id}:
    parameters:
      - $ref: '#/components/parameters/TaskId'
    get:
      tags: [Tasks]
      summary: Obtener tarea por ID
      operationId: getTaskById
      responses:
        '200':
          description: Tarea encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskSuccessResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'
    patch:
      tags: [Tasks]
      summary: Actualizar tarea
      description: |
        Actualización parcial (PATCH). Al menos un campo es obligatorio.
        Registra log de actividad. Si cambia `status`, el log indica "Estado cambiado".
        Envía `assignedUserId: null` para desasignar la tarea.
      operationId: updateTask
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTaskRequest'
            examples:
              cambiarEstado:
                summary: Cambiar estado
                value:
                  status: in_progress
              actualizarTitulo:
                summary: Actualizar título
                value:
                  title: Incidencia login (en revisión)
              desasignar:
                summary: Desasignar usuario
                value:
                  assignedUserId: null
      responses:
        '200':
          description: Tarea actualizada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskSuccessResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      tags: [Tasks]
      summary: Eliminar tarea
      description: Elimina la tarea y registra un log de actividad.
      operationId: deleteTask
      responses:
        '200':
          description: Tarea eliminada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteSuccessResponse'
              example:
                success: true
                data: null
                message: Tarea eliminada
        '404':
          $ref: '#/components/responses/NotFound'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/users:
    get:
      tags: [Users]
      summary: Listar usuarios
      description: |
        Obtiene usuarios paginados ordenados por fecha de creación (más reciente primero).
        Query params: `page` (default 1), `limit` (default 20, máx 100).
      operationId: listUsers
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Lista de usuarios
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserListSuccessResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      tags: [Users]
      summary: Crear usuario
      description: |
        Crea un usuario del equipo. El email se normaliza a minúsculas y debe ser único.
        No incluye password (sin autenticación en esta versión).
      operationId: createUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
            example:
              firstName: Juan
              lastName: Pérez
              email: juan@empresa.com
      responses:
        '201':
          description: Usuario creado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSuccessResponse'
        '400':
          description: Validación fallida o email duplicado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                validacion:
                  summary: Campo inválido
                  value:
                    success: false
                    error:
                      statusCode: 400
                      message: El email no es válido
                duplicado:
                  summary: Email ya registrado
                  value:
                    success: false
                    error:
                      statusCode: 400
                      message: El email ya está registrado
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/users/{id}:
    parameters:
      - $ref: '#/components/parameters/UserId'
    get:
      tags: [Users]
      summary: Obtener usuario por ID
      operationId: getUserById
      responses:
        '200':
          description: Usuario encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSuccessResponse'
        '404':
          description: Usuario no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                error:
                  statusCode: 404
                  message: Usuario no encontrado
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'
    patch:
      tags: [Users]
      summary: Actualizar usuario
      description: Actualización parcial (PATCH). Al menos un campo es obligatorio.
      operationId: updateUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
            example:
              firstName: Juan Carlos
      responses:
        '200':
          description: Usuario actualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSuccessResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          description: Usuario no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                error:
                  statusCode: 404
                  message: Usuario no encontrado
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      tags: [Users]
      summary: Eliminar usuario
      operationId: deleteUser
      responses:
        '200':
          description: Usuario eliminado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteSuccessResponse'
              example:
                success: true
                data: null
                message: Usuario eliminado
        '404':
          description: Usuario no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                error:
                  statusCode: 404
                  message: Usuario no encontrado
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/logs:
    get:
      tags: [Logs]
      summary: Listar logs de actividad
      description: |
        Obtiene logs paginados ordenados por fecha (más reciente primero).
        Query params: `page` (default 1), `limit` (default 20, máx 100).
      operationId: listLogs
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Lista de logs
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogListSuccessResponse'
              example:
                success: true
                data:
                  - id: abc123
                    taskId: tjrcxKTo3Lc1C7JSarJd
                    taskCode: TAN-1
                    action: Tarea creada
                    detail: 'Tarea "Incidencia login" creada'
                    createdAt: '2026-07-09T06:13:48.502Z'
                meta:
                  total: 1
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/logs/stream:
    get:
      tags: [Logs]
      summary: Stream de logs en tiempo real (SSE)
      description: |
        Mantiene una conexión abierta y envía cada nuevo log como evento SSE.

        Formato de cada evento:
        ```
        data: {"success":true,"data":{"id":"...","taskId":"...","taskCode":"TAN-1","action":"Tarea creada","detail":"...","createdAt":"..."}}
        ```

        Ejemplo en el navegador:
        ```js
        const source = new EventSource('http://localhost:3000/api/logs/stream');
        source.onmessage = (e) => console.log(JSON.parse(e.data).data);
        ```
      operationId: streamLogs
      responses:
        '200':
          description: Stream SSE activo
          content:
            text/event-stream:
              schema:
                type: string
                example: |
                  data: {"success":true,"data":{"id":"RYzk7IiUyySFaHDZT2xj","taskId":"FNtB9PV0m7Y1EUrILY8A","taskCode":"TAN-1","action":"Tarea creada","detail":"Tarea \"Test SSE\" creada","createdAt":"2026-07-09T06:13:57.962Z"}}

components:
  parameters:
    TaskId:
      name: id
      in: path
      required: true
      description: Identificador de la tarea en Firestore
      schema:
        type: string
        minLength: 1
      example: tjrcxKTo3Lc1C7JSarJd
    UserId:
      name: id
      in: path
      required: true
      description: Identificador del usuario en Firestore
      schema:
        type: string
        minLength: 1
      example: rL78DWAccy74Z3xYEOxN
    Page:
      name: page
      in: query
      required: false
      description: Número de página (desde 1)
      schema:
        type: integer
        minimum: 1
        default: 1
      example: 1
    Limit:
      name: limit
      in: query
      required: false
      description: Cantidad de elementos por página (máximo 100)
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
      example: 20

  responses:
    BadRequest:
      description: Error de validación
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            error:
              statusCode: 400
              message: El título es obligatorio
    NotFound:
      description: Recurso no encontrado
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            error:
              statusCode: 404
              message: Tarea no encontrada
    InternalServerError:
      description: Error interno del servidor
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            error:
              statusCode: 500
              message: Error interno del servidor

  schemas:
    ApiErrorBody:
      type: object
      required: [statusCode, message]
      properties:
        statusCode:
          type: integer
          example: 404
        message:
          type: string
          example: Tarea no encontrada

    ErrorResponse:
      type: object
      required: [success, error]
      properties:
        success:
          type: boolean
          enum: [false]
        error:
          $ref: '#/components/schemas/ApiErrorBody'

    ApiMeta:
      type: object
      properties:
        total:
          type: integer
          example: 25
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 20
        totalPages:
          type: integer
          example: 2
        hasNext:
          type: boolean
          example: true
        hasPrev:
          type: boolean
          example: false

    TaskSuccessResponse:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          $ref: '#/components/schemas/Task'

    TaskListSuccessResponse:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          type: array
          items:
            $ref: '#/components/schemas/Task'
        meta:
          $ref: '#/components/schemas/ApiMeta'

    UserSuccessResponse:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          $ref: '#/components/schemas/User'

    UserListSuccessResponse:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          type: array
          items:
            $ref: '#/components/schemas/User'
        meta:
          $ref: '#/components/schemas/ApiMeta'

    LogListSuccessResponse:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          type: array
          items:
            $ref: '#/components/schemas/Log'
        meta:
          $ref: '#/components/schemas/ApiMeta'

    HealthSuccessResponse:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          $ref: '#/components/schemas/HealthPayload'

    DeleteSuccessResponse:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          type: object
          nullable: true
          example: null
        message:
          type: string
          example: Tarea eliminada

    HealthPayload:
      type: object
      required: [status, timestamp, uptime, environment, database]
      properties:
        status:
          type: string
          enum: [ok, degraded]
        timestamp:
          type: string
          format: date-time
        uptime:
          type: number
          description: Tiempo activo del proceso en segundos
        environment:
          type: string
          enum: [development, production, test]
        database:
          type: string
          enum: [connected, disconnected]

    TaskStatus:
      type: string
      enum: [pending, in_progress, completed, cancelled]
      description: |
        Estado de la tarea.
        - `pending` — pendiente
        - `in_progress` — en progreso
        - `completed` — completada
        - `cancelled` — cancelada

    TaskPriority:
      type: string
      enum: [low, medium, high]
      description: |
        Prioridad de la tarea.
        - `low` — baja
        - `medium` — media
        - `high` — alta

    Task:
      type: object
      required: [id, code, title, description, status, priority, assignedUserId, createdAt, updatedAt]
      properties:
        id:
          type: string
          example: tjrcxKTo3Lc1C7JSarJd
        code:
          type: string
          description: Código legible único generado al crear la tarea
          example: TAN-1
        title:
          type: string
          example: Incidencia login
        description:
          type: string
          example: Error al iniciar sesión en producción
        status:
          $ref: '#/components/schemas/TaskStatus'
        priority:
          $ref: '#/components/schemas/TaskPriority'
        assignedUserId:
          type: string
          nullable: true
          description: ID del usuario asignado, o `null` si no hay asignación
          example: rL78DWAccy74Z3xYEOxN
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    User:
      type: object
      required: [id, firstName, lastName, email, createdAt, updatedAt]
      properties:
        id:
          type: string
          example: rL78DWAccy74Z3xYEOxN
        firstName:
          type: string
          example: Juan
        lastName:
          type: string
          example: Pérez
        email:
          type: string
          format: email
          description: Email normalizado a minúsculas, único en el sistema
          example: juan@empresa.com
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateUserRequest:
      type: object
      required: [firstName, lastName, email]
      properties:
        firstName:
          type: string
          minLength: 1
          example: Juan
        lastName:
          type: string
          minLength: 1
          example: Pérez
        email:
          type: string
          format: email
          example: juan@empresa.com

    UpdateUserRequest:
      type: object
      minProperties: 1
      properties:
        firstName:
          type: string
          minLength: 1
        lastName:
          type: string
          minLength: 1
        email:
          type: string
          format: email

    CreateTaskRequest:
      type: object
      required: [title, description]
      properties:
        title:
          type: string
          minLength: 1
          example: Incidencia login
        description:
          type: string
          minLength: 1
          example: Error al iniciar sesión en producción
        status:
          $ref: '#/components/schemas/TaskStatus'
          default: pending
        priority:
          $ref: '#/components/schemas/TaskPriority'
          default: medium
        assignedUserId:
          type: string
          nullable: true
          description: ID de un usuario existente. Omitir o `null` para sin asignación.
          example: rL78DWAccy74Z3xYEOxN

    UpdateTaskRequest:
      type: object
      minProperties: 1
      properties:
        title:
          type: string
          minLength: 1
        description:
          type: string
          minLength: 1
        status:
          $ref: '#/components/schemas/TaskStatus'
        priority:
          $ref: '#/components/schemas/TaskPriority'
        assignedUserId:
          type: string
          nullable: true
          description: Asignar usuario por ID, o `null` para desasignar

    Log:
      type: object
      required: [id, taskId, taskCode, action, detail, createdAt]
      properties:
        id:
          type: string
          example: RYzk7IiUyySFaHDZT2xj
        taskId:
          type: string
          example: tjrcxKTo3Lc1C7JSarJd
        taskCode:
          type: string
          description: Código legible de la tarea (TAN-N)
          example: TAN-1
        action:
          type: string
          enum:
            - Tarea creada
            - Tarea actualizada
            - Tarea eliminada
            - Estado cambiado
          example: Tarea creada
        detail:
          type: string
          example: 'Tarea "Incidencia login" creada'
        createdAt:
          type: string
          format: date-time

